<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Pay MTN Mobile Money and Orange Money accounts directly — from anywhere, in seconds." />
<title>MoMo›Me — Pay Mobile Money</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<script>
  // Apply the saved theme before first paint to avoid a flash of the wrong theme.
  (function () {
    try {
      var saved = JSON.parse(localStorage.getItem("mm_theme") || "null");
      var dark = saved ? !!saved.dark : window.matchMedia("(prefers-color-scheme: dark)").matches;
      var r = document.documentElement;
      r.dataset.theme = dark ? "dark" : "light";
      r.dataset.accent = (saved && saved.accent) || "clay";
      r.dataset.density = (saved && saved.density) || "cozy";
    } catch (e) { /* ignore */ }
  })();
</script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
