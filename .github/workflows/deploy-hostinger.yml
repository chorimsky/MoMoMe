name: Deploy to Hostinger (production)

# Deliberate go-live: click "Run workflow" in the Actions tab, or push a v* tag.
# (Day-to-day pushes still auto-deploy to Vercel for testing — this is the
# separate, manual production step to momome.xyz.)
on:
  workflow_dispatch:
    inputs:
      api_base:
        description: "VITE_API_BASE — the backend the SPA calls"
        required: false
        default: "https://momome-api-production.up.railway.app/api"
  push:
    tags: ["v*"]

concurrency:
  group: deploy-hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4        # reads pnpm version from package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build frontend (type-checked)
        env:
          VITE_API_BASE: ${{ github.event.inputs.api_base || 'https://momome-api-production.up.railway.app/api' }}
          SITE_URL: https://momome.xyz
        run: |
          pnpm --filter @momome/app build
          [ -f app/dist/.htaccess ] || cp app/public/.htaccess app/dist/.htaccess

      - name: Deploy to Hostinger over SSH
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_PORT }}
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          WEB_ROOT: ${{ secrets.HOSTINGER_WEBROOT }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          rsync -rz \
            -e "ssh -p $SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            app/dist/ "$SSH_USER@$SSH_HOST:$WEB_ROOT/"

      - name: Verify live bundle
        run: |
          sleep 3
          LIVE=$(curl -s https://momome.xyz/ | grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' | head -1)
          LOCAL="assets/$(basename app/dist/assets/index-*.js)"
          echo "live=$LIVE  local=$LOCAL"
          if [ "$LIVE" = "$LOCAL" ]; then
            echo "✅ momome.xyz is serving the new build"
          else
            echo "::warning::Live bundle not yet matching (LiteSpeed cache may lag): live=$LIVE local=$LOCAL"
          fi
