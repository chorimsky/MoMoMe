<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MoMo›Me — Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="momome.css" />
<style>
  html, body { height: 100%; }
  body { background: var(--paper-2); }
  .ops-wrap { max-width: 1320px; margin: 0 auto; padding: 16px clamp(14px, 2.5vw, 30px) 50px; }
  .ops-top { display: flex; align-items: center; justify-content: space-between; padding: 8px 2px 20px; flex-wrap: wrap; gap: 12px; }
  .ops-nav { display: flex; gap: 2px; align-items: center; }
  .ops-nav a { font-size: 13px; font-weight: 600; color: var(--ink-2); text-decoration: none; padding: 7px 11px; border-radius: 8px; }
  .ops-nav a:hover { background: var(--surface); color: var(--ink); }
  .ops-nav a.on { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }
  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: minmax(0,1fr) 348px; gap: 16px; align-items: start; }
  @media (max-width: 1000px) { .grid { grid-template-columns: 1fr; } .kpis { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 560px) { .kpis { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="ops.jsx"></script>
</body>
</html>
